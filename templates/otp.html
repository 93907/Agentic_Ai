<!DOCTYPE html>
<html>
<head>

    <title>OTP Verification - Academic AI Assistant</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .otp-card{

            width:450px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(15px);

            border-radius:25px;

            padding:40px;

            box-shadow:0px 10px 30px rgba(0,0,0,0.3);

            animation:fadeIn 0.8s ease;
        }

        .logo{
            text-align:center;
            font-size:55px;
            margin-bottom:15px;
        }

        h1{
            text-align:center;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:14px;
            margin:12px 0;
            border:none;
            border-radius:12px;
            font-size:16px;
            text-align:center;
            letter-spacing:3px;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:10px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
        }

        .info-box{
            background:rgba(255,255,255,0.08);
            padding:12px;
            border-radius:12px;
            margin-top:20px;
            text-align:center;
            color:#cbd5e1;
            font-size:14px;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

<div class="otp-card">

    <div class="logo">
        🔐
    </div>

    <h1>2FA Verification</h1>

    <p class="subtitle">
        Enter the OTP from Google Authenticator
    </p>

    <form method="POST">

        <input
            type="text"
            name="otp"
            placeholder="Enter 6 Digit OTP"
            required>

        <button type="submit">
            Verify OTP
        </button>

    </form>

    <div class="info-box">
        Your account is protected using
        Two-Factor Authentication (2FA)
    </div>

</div>

</body>
</html>
