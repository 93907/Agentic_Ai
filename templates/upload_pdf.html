<!DOCTYPE html>
<html>
<head>

    <title>Upload Study Material</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            background:#0f172a;
            margin:0;
            font-family:'Segoe UI',sans-serif;
        }

        .topbar{
            height:70px;
            background:#111827;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 25px;
            color:white;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        .profile{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .profile-circle{
            width:40px;
            height:40px;
            border-radius:50%;
            background:#2563eb;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;
        }

        .upload-container{
            width:700px;
            margin:50px auto;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0 5px 25px rgba(0,0,0,0.4);
        }

        .upload-title{
            text-align:center;
            color:white;
            margin-bottom:30px;
        }

        .upload-box{
            border:3px dashed #3b82f6;
            border-radius:20px;
            padding:50px;
            text-align:center;
            color:white;
        }

        .custom-file-upload{
            display:inline-block;
            padding:15px 30px;
            background:#2563eb;
            color:white;
            border-radius:12px;
            cursor:pointer;
            font-size:18px;
        }

        .custom-file-upload:hover{
            background:#1d4ed8;
        }

        input[type="file"]{
            display:none;
        }

        #fileName{
            margin-top:20px;
            font-size:18px;
            color:#cbd5e1;
        }

        .upload-btn{
            width:100%;
            margin-top:25px;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#10b981;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .upload-btn:hover{
            background:#059669;
        }

        .back-btn{
            display:block;
            text-align:center;
            margin-top:20px;
            color:#60a5fa;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="topbar">

    <div class="logo">
        🎓 Academic AI Assistant
    </div>

    <div class="profile">

        <span>{{ session['username'] }}</span>

        <div class="profile-circle">
            {{ session['username'][0]|upper }}
        </div>

    </div>

</div>

<div class="upload-container">

    <h1 class="upload-title">
        📚 Upload Study Material
    </h1>

    <form method="POST" enctype="multipart/form-data">

        <div class="upload-box">

            <label class="custom-file-upload">

                📄 Choose PDF File

                <input
                    type="file"
                    id="pdfFile"
                    name="pdf"
                    accept=".pdf"
                    required>

            </label>

            <div id="fileName">
                No file selected
            </div>

        </div>

        <button
            class="upload-btn"
            type="submit">

            Upload PDF

        </button>

    </form>

    <a href="/dashboard" class="back-btn">
        ← Back to Dashboard
    </a>

</div>

<script>

document.getElementById("pdfFile").addEventListener("change", function(){

    if(this.files.length > 0){

        document.getElementById("fileName").innerHTML =
        "✅ Selected File: " + this.files[0].name;

    }

});

</script>

</body>
</html>
